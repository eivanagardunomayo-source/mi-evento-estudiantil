<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Asistencia W2TF 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--cyan:#00CFFF;--magenta:#FF00C8;--purple:#7A00FF;--gold:#F59E0B;}
    body{font-family:'Outfit',sans-serif;background:#050714;color:#fff;min-height:100vh;padding:24px 16px 60px;}
    .wrap{max-width:900px;margin:0 auto;}

    /* Login */
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;}
    .login-card{
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;padding:36px 28px;width:100%;max-width:360px;text-align:center;
    }
    .login-card h2{font-size:20px;font-weight:800;margin-bottom:6px;}
    .login-card p{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px;}
    input[type=password]{
      width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
      border-radius:10px;padding:13px 16px;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;
      outline:none;margin-bottom:14px;
    }
    input[type=password]:focus{border-color:var(--cyan);}
    .btn-login{
      width:100%;padding:14px;background:linear-gradient(135deg,var(--cyan),var(--purple));
      border:none;border-radius:10px;color:#fff;font-family:'Outfit',sans-serif;
      font-size:14px;font-weight:700;cursor:pointer;
    }
    .login-err{color:#ff7070;font-size:13px;margin-top:10px;display:none;}

    /* Panel */
    #admin-panel{display:none;}
    .top-bar{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
    .top-bar h1{font-size:20px;font-weight:800;flex:1;}
    .top-bar .logo{width:38px;}
    .export-btn{
      padding:10px 18px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
      border-radius:10px;color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
      cursor:pointer;transition:border-color .2s;
    }
    .export-btn:hover{border-color:var(--cyan);color:var(--cyan);}
    .refresh-btn{
      padding:10px 18px;background:rgba(0,207,255,0.1);border:1px solid rgba(0,207,255,0.25);
      border-radius:10px;color:var(--cyan);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
      cursor:pointer;
    }

    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
    @media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
    .stat-card{
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;padding:16px;text-align:center;
    }
    .stat-n{font-size:28px;font-weight:800;}
    .stat-n.cyan{color:var(--cyan);}
    .stat-n.gold{color:var(--gold);}
    .stat-n.magenta{color:var(--magenta);}
    .stat-n.green{color:#34D399;}
    .stat-label{font-size:11px;color:rgba(255,255,255,0.35);margin-top:4px;line-height:1.3;}

    /* Filtro */
    .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .filter-btn{
      padding:7px 14px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);
      background:transparent;color:rgba(255,255,255,0.45);font-family:'Outfit',sans-serif;
      font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;
    }
    .filter-btn.active{background:rgba(0,207,255,0.12);border-color:rgba(0,207,255,0.35);color:var(--cyan);}

    /* Tabla */
    .table-wrap{overflow-x:auto;border-radius:14px;border:1px solid rgba(255,255,255,0.08);}
    table{width:100%;border-collapse:collapse;min-width:620px;}
    thead tr{background:rgba(255,255,255,0.04);}
    th{padding:12px 14px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
       color:rgba(255,255,255,0.35);text-align:left;white-space:nowrap;}
    td{padding:12px 14px;font-size:13px;border-top:1px solid rgba(255,255,255,0.05);}
    tr:hover td{background:rgba(255,255,255,0.02);}
    .dot{
      display:inline-block;width:22px;height:22px;border-radius:6px;
      font-size:12px;text-align:center;line-height:22px;
    }
    .dot.ok{background:rgba(0,207,255,0.15);color:var(--cyan);}
    .dot.no{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);}
    .dot.bonus-ok{background:rgba(245,158,11,0.15);color:var(--gold);}
    .completo-chip{
      display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.06em;
      border-radius:6px;padding:3px 8px;
    }
    .chip-green{background:rgba(52,211,153,0.12);color:#34D399;}
    .chip-gold{background:rgba(245,158,11,0.12);color:var(--gold);}
    .chip-grey{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);}
    .nombre-cel{font-weight:600;}
    .email-cel{color:rgba(255,255,255,0.4);font-size:12px;}

    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--cyan);
      border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:14px;}
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <img src="../logo-w2tf.png" style="width:60px;margin:0 auto 20px;display:block;" alt="W2TF"/>
      <h2>Panel Admin</h2>
      <p>Asistencia W2TF 2026 — Solo organizadores</p>
      <input type="password" id="pass-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')entrar()"/>
      <button class="btn-login" onclick="entrar()">Entrar →</button>
      <div class="login-err" id="login-err">Contraseña incorrecta</div>
    </div>
  </div>

  <!-- PANEL -->
  <div id="admin-panel">
    <div class="wrap">
      <div class="top-bar">
        <img src="../logo-w2tf.png" class="logo" alt="W2TF"/>
        <h1>Asistencia W2TF 2026</h1>
        <button class="export-btn" onclick="exportarCSV()">⬇ Exportar CSV</button>
        <button class="refresh-btn" onclick="cargar()">↻ Actualizar</button>
      </div>

      <div id="cargando"><div class="spinner"></div></div>

      <div id="contenido" style="display:none;">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-n cyan" id="s-total">0</div><div class="stat-label">Total registrados</div></div>
          <div class="stat-card"><div class="stat-n green" id="s-todas">0</div><div class="stat-label">Todas las ponencias</div></div>
          <div class="stat-card"><div class="stat-n gold" id="s-bonus">0</div><div class="stat-label">Todo + Bonus</div></div>
          <div class="stat-card"><div class="stat-n magenta" id="s-solo-bonus">0</div><div class="stat-label">Solo bonus</div></div>
        </div>

        <div class="filter-bar">
          <button class="filter-btn active" onclick="filtrar('todos',this)">Todos</button>
          <button class="filter-btn" onclick="filtrar('p1',this)">P1 ✓</button>
          <button class="filter-btn" onclick="filtrar('p2',this)">P2 ✓</button>
          <button class="filter-btn" onclick="filtrar('p3',this)">P3 ✓</button>
          <button class="filter-btn" onclick="filtrar('bonus',this)">Bonus ✓</button>
          <button class="filter-btn" onclick="filtrar('completo',this)">Completo</button>
          <button class="filter-btn" onclick="filtrar('completo-bonus',this)">Todo + Bonus</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre / Email</th>
                <th>P1</th>
                <th>P2</th>
                <th>P3</th>
                <th>Bonus</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="tabla-body"></tbody>
          </table>
          <div class="empty" id="tabla-empty" style="display:none;">Sin resultados para este filtro</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE = window.location.origin;
    let datos   = [];
    let passOk  = '';

    function entrar() {
      const p = document.getElementById('pass-input').value;
      if (!p) return;
      passOk = p;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display  = 'block';
      cargar();
    }

    async function cargar() {
      document.getElementById('cargando').style.display  = 'block';
      document.getElementById('contenido').style.display = 'none';

      try {
        const resp = await fetch(`${BASE}/api/admin-asistencia?pass=${encodeURIComponent(passOk)}`);
        if (resp.status === 401) {
          document.getElementById('admin-panel').style.display  = 'none';
          document.getElementById('login-screen').style.display = 'flex';
          document.getElementById('login-err').style.display = 'block';
          return;
        }
        const data = await resp.json();
        datos = data.asistentes || [];
        renderStats();
        renderTabla('todos');
        document.getElementById('cargando').style.display  = 'none';
        document.getElementById('contenido').style.display = 'block';
      } catch(err) {
        document.getElementById('cargando').innerHTML = `<p style="text-align:center;color:#ff7070;padding:40px;">Error: ${err.message}</p>`;
      }
    }

    function renderStats() {
      document.getElementById('s-total').textContent     = datos.length;
      document.getElementById('s-todas').textContent     = datos.filter(d => d.completoTodo).length;
      document.getElementById('s-bonus').textContent     = datos.filter(d => d.completoTodoMasBonus).length;
      document.getElementById('s-solo-bonus').textContent= datos.filter(d => d.bonus).length;
    }

    function filtrar(tipo, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTabla(tipo);
    }

    function renderTabla(tipo) {
      let lista = datos;
      if (tipo === 'p1')            lista = datos.filter(d => d.p1);
      else if (tipo === 'p2')       lista = datos.filter(d => d.p2);
      else if (tipo === 'p3')       lista = datos.filter(d => d.p3);
      else if (tipo === 'bonus')    lista = datos.filter(d => d.bonus);
      else if (tipo === 'completo') lista = datos.filter(d => d.completoTodo);
      else if (tipo === 'completo-bonus') lista = datos.filter(d => d.completoTodoMasBonus);

      const tbody = document.getElementById('tabla-body');
      const empty = document.getElementById('tabla-empty');

      if (lista.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = lista.map((a, i) => {
        const estadoChip = a.completoTodoMasBonus
          ? `<span class="completo-chip chip-gold">Todo + Bonus</span>`
          : a.completoTodo
            ? `<span class="completo-chip chip-green">Completo</span>`
            : `<span class="completo-chip chip-grey">Parcial</span>`;

        return `<tr>
          <td style="color:rgba(255,255,255,0.3);font-size:12px;">${i + 1}</td>
          <td>
            <div class="nombre-cel">${esc(a.nombre)}</div>
            <div class="email-cel">${esc(a.email)}</div>
          </td>
          <td><span class="dot ${a.p1 ? 'ok' : 'no'}" title="${a.p1 || ''}">${a.p1 ? '✓' : '·'}</span></td>
          <td><span class="dot ${a.p2 ? 'ok' : 'no'}" title="${a.p2 || ''}">${a.p2 ? '✓' : '·'}</span></td>
          <td><span class="dot ${a.p3 ? 'ok' : 'no'}" title="${a.p3 || ''}">${a.p3 ? '✓' : '·'}</span></td>
          <td><span class="dot ${a.bonus ? 'bonus-ok' : 'no'}" title="${a.bonus || ''}">${a.bonus ? '⚡' : '·'}</span></td>
          <td>${estadoChip}</td>
        </tr>`;
      }).join('');
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function exportarCSV() {
      const headers = ['Nombre','Email','Teléfono','Ponencia 1','Ponencia 2','Ponencia 3','Bonus','Completo','Todo+Bonus','Registrado el'];
      const rows = datos.map(a => [
        a.nombre, a.email, a.telefono || '',
        a.p1 || '', a.p2 || '', a.p3 || '', a.bonus || '',
        a.completoTodo ? 'SÍ' : 'NO',
        a.completoTodoMasBonus ? 'SÍ' : 'NO',
        a.registradoEl || ''
      ]);
      const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'asistencia-w2tf-2026.csv'; a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
