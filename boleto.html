<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Mi Boleto · W2TF 2026</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:#050714;
      font-family:'Helvetica Neue',Arial,sans-serif;
      min-height:100vh;
      display:flex;flex-direction:column;align-items:center;
      padding:24px 16px 56px;
    }

    /* ── ACCIONES ── */
    .actions{width:100%;max-width:420px;display:none;gap:10px;margin-bottom:16px;}
    .btn-main{
      flex:1;background:linear-gradient(135deg,#7C3AED,#00CFFF);
      color:#fff;border:none;border-radius:14px;
      padding:15px 10px;font-size:15px;font-weight:700;
      cursor:pointer;font-family:inherit;
      display:flex;align-items:center;justify-content:center;gap:7px;
      -webkit-tap-highlight-color:transparent;
      text-decoration:none;
    }
    .btn-sec{
      flex:1;background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.15);
      color:#CBD5E1;border-radius:14px;
      padding:15px 10px;font-size:15px;font-weight:600;
      text-decoration:none;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;justify-content:center;gap:7px;
      -webkit-tap-highlight-color:transparent;
    }
    .hint{font-size:11px;color:#475569;text-align:center;margin-bottom:20px;max-width:400px;line-height:1.7;display:none;}

    /* ── GUÍA PDF ── */
    .pdf-guide{
      position:fixed;inset:0;z-index:9999;
      background:rgba(5,7,20,0.88);
      display:flex;align-items:flex-end;justify-content:center;
      opacity:0;pointer-events:none;
      transition:opacity .25s;
      backdrop-filter:blur(4px);
    }
    .pdf-guide.show{opacity:1;pointer-events:auto;}
    .pdf-guide-box{
      width:100%;max-width:440px;
      background:#0f1140;
      border:1px solid rgba(122,0,255,0.3);
      border-radius:24px 24px 0 0;
      padding:28px 24px 40px;
    }
    .pdf-guide-title{color:#fff;font-size:17px;font-weight:800;margin-bottom:4px;}
    .pdf-guide-sub{color:#64748B;font-size:12px;margin-bottom:20px;}
    .pdf-step{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
    .pdf-step-num{
      min-width:26px;height:26px;border-radius:50%;
      background:linear-gradient(135deg,#7C3AED,#00CFFF);
      color:#fff;font-size:12px;font-weight:800;
      display:flex;align-items:center;justify-content:center;
    }
    .pdf-step-text{color:#CBD5E1;font-size:13px;line-height:1.5;padding-top:4px;}
    .pdf-step-text strong{color:#fff;}
    .pdf-btn-ok{
      width:100%;margin-top:20px;
      background:linear-gradient(135deg,#7C3AED,#00CFFF);
      color:#fff;border:none;border-radius:12px;
      padding:14px;font-size:15px;font-weight:700;
      cursor:pointer;font-family:inherit;
    }

    /* ── TICKET ── */
    .ticket{
      width:100%;max-width:420px;
      border-radius:24px;overflow:hidden;
      background:#06061a;
      border:1px solid rgba(122,0,255,0.45);
      box-shadow:0 0 0 1px rgba(0,207,255,0.08),0 28px 70px rgba(122,0,255,0.4),0 8px 24px rgba(0,207,255,0.18);
    }
    .t-logos{
      background:linear-gradient(155deg,#7A00FF 0%,#4f22e8 45%,#00CFFF 100%);
      padding:24px 24px 18px;text-align:center;position:relative;
    }
    .t-logos::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
    .logo-belae-sm{height:24px;margin-bottom:10px;opacity:.9;display:block;margin-left:auto;margin-right:auto;}
    .logo-w2tf-main{width:180px;max-width:78%;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;}
    .ticket-badge{display:inline-block;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:999px;padding:5px 16px;color:#fff;font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;}

    .t-num{background:rgba(0,207,255,0.08);border-top:1px solid rgba(0,207,255,0.15);border-bottom:1px solid rgba(0,207,255,0.15);padding:9px 24px;text-align:center;}
    .t-num span{color:#00CFFF;font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;}

    .t-body{padding:20px 24px 6px;}
    .t-holder-label{color:#475569;font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;}
    .t-holder-name{color:#fff;font-size:24px;font-weight:900;margin-bottom:16px;line-height:1.15;letter-spacing:-.01em;}

    .t-info{width:100%;border-collapse:collapse;font-size:12px;}
    .t-info td{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
    .t-info tr:last-child td{border-bottom:none;}
    .t-info .k{color:#475569;}
    .t-info .v{color:#fff;text-align:right;font-weight:600;}
    .t-info .cyan{color:#00CFFF!important;}
    .t-info .purple{color:#A78BFA!important;}

    .t-sep{margin:16px 0 0;border:none;border-top:2px dashed rgba(255,255,255,0.08);position:relative;}
    .t-sep::before,.t-sep::after{content:'';position:absolute;top:-9px;width:16px;height:16px;border-radius:50%;background:#050714;border:1px solid rgba(122,0,255,0.25);}
    .t-sep::before{left:-26px;}
    .t-sep::after{right:-26px;}

    .t-qr{padding:18px 24px 16px;text-align:center;}
    .qr-box{display:inline-block;background:#fff;border-radius:14px;padding:8px;box-shadow:0 4px 20px rgba(0,207,255,0.2);margin-bottom:8px;}
    .qr-box img{display:block;width:150px;height:150px;}
    .t-qr-label{color:#475569;font-size:10px;line-height:1.6;}

    .t-foot{background:rgba(122,0,255,0.05);border-top:1px solid rgba(122,0,255,0.12);padding:11px 24px;display:flex;align-items:center;justify-content:space-between;}
    .t-code{color:#A78BFA;font-size:10px;font-weight:700;letter-spacing:.1em;font-family:'Courier New',monospace;}
    .t-personal{color:#334155;font-size:10px;}

    .state{text-align:center;padding:48px 20px;color:#475569;max-width:420px;width:100%;}
    .spinner{width:38px;height:38px;border:3px solid rgba(124,58,237,0.15);border-top-color:#7C3AED;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── MODAL IMAGEN MÓVIL ── */
    .img-modal{
      position:fixed;inset:0;z-index:9999;
      background:rgba(5,7,20,0.96);
      display:flex;flex-direction:column;align-items:center;
      padding:24px 16px 48px;
      overflow-y:auto;-webkit-overflow-scrolling:touch;
      opacity:0;pointer-events:none;
      transition:opacity .25s;
    }
    .img-modal.show{opacity:1;pointer-events:auto;}
    .img-modal-tip{
      width:100%;max-width:400px;
      background:rgba(124,58,237,0.15);
      border:1px solid rgba(124,58,237,0.35);
      border-radius:12px;padding:14px 18px;
      color:#CBD5E1;font-size:14px;font-weight:600;text-align:center;
      margin-bottom:20px;line-height:1.6;flex-shrink:0;
    }
    .img-modal-tip strong{color:#fff;}
    .img-modal-ticket{
      width:100%;max-width:400px;
      border-radius:20px;display:block;
      box-shadow:0 8px 40px rgba(0,207,255,0.2);
      margin-bottom:20px;flex-shrink:0;
    }
    .img-modal-close{
      width:100%;max-width:400px;flex-shrink:0;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      color:#94A3B8;border-radius:12px;
      padding:14px;font-size:14px;font-weight:600;
      cursor:pointer;font-family:inherit;
    }
    .btn-main:disabled{opacity:.6;cursor:not-allowed;}

    /* ══ PRINT — 1 página exacta ══ */
    @media print{
      @page{size:108mm 186mm;margin:0;}
      html,body{
        background:#050714!important;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
        padding:0!important;margin:0!important;
        display:block!important;
        width:108mm;
      }
      .actions,.hint{display:none!important;}
      .ticket{
        max-width:100%!important;width:100%!important;
        border-radius:0!important;box-shadow:none!important;border:none!important;
        page-break-inside:avoid;break-inside:avoid;
      }
      .t-logos{padding:14px 18px 12px!important;}
      .logo-belae-sm{height:18px!important;margin-bottom:7px!important;}
      .logo-w2tf-main{width:140px!important;margin-bottom:9px!important;}
      .ticket-badge{font-size:8px!important;padding:4px 12px!important;}
      .t-num{padding:7px 18px!important;}
      .t-num span{font-size:10px!important;}
      .t-body{padding:14px 18px 4px!important;}
      .t-holder-name{font-size:19px!important;margin-bottom:12px!important;}
      .t-info{font-size:11px!important;}
      .t-info td{padding:5px 0!important;}
      .t-sep{margin:12px 0 0!important;}
      .t-qr{padding:14px 18px 12px!important;}
      .qr-box img{width:126px!important;height:126px!important;}
      .t-qr-label{font-size:9px!important;}
      .t-foot{padding:9px 18px!important;}
      .t-sep::before,.t-sep::after{background:#050714!important;}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

<div class="actions" id="actions">
  <button class="btn-main" id="btn-main" onclick="accionPrincipal()">
    <span id="btn-icon" style="font-size:17px;"></span>
    <span id="btn-label"></span>
  </button>
  <a class="btn-sec" id="btn-transfer" href="#">
    <span style="font-size:16px;">↗</span> Transferir
  </a>
</div>
<p class="hint" id="hint"></p>

<div class="pdf-guide" id="pdf-guide">
  <div class="pdf-guide-box" id="pdf-guide-box"></div>
</div>

<div class="img-modal" id="img-modal">
  <div class="img-modal-tip" id="img-modal-tip"></div>
  <img id="img-modal-img" class="img-modal-ticket" alt="Boleto W2TF 2026"/>
  <button class="img-modal-close" onclick="document.getElementById('img-modal').classList.remove('show')">Cerrar</button>
</div>

<div id="wrap">
  <div class="state"><div class="spinner"></div><p>Cargando boleto…</p></div>
</div>

<script>
const params   = new URLSearchParams(location.search);
const token    = params.get('t');
const autoSave = params.get('dl') === '1';
const wrap     = document.getElementById('wrap');
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const isIOS    = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const guide    = document.getElementById('pdf-guide');
const guideBox = document.getElementById('pdf-guide-box');

function accionPrincipal() {
  if (!isMobile) {
    window.print();
    return;
  }
  guardarImagenMobile();
}

async function guardarImagenMobile() {
  const btn    = document.getElementById('btn-main');
  const lblEl  = document.getElementById('btn-label');
  const iconEl = document.getElementById('btn-icon');
  btn.disabled = true;
  iconEl.textContent = '⏳';
  lblEl.textContent  = 'Generando…';

  try {
    const ticket = document.querySelector('.ticket');
    const canvas = await html2canvas(ticket, {
      scale: 3,
      backgroundColor: '#06061a',
      useCORS: true,
      allowTaint: false,
      logging: false,
      imageTimeout: 10000
    });

    if (isIOS) {
      const tipEl = document.getElementById('img-modal-tip');
      tipEl.innerHTML = '📱 <strong>Mantén presionado</strong> la imagen de abajo<br/>→ elige <strong>Guardar en Fotos</strong>';
      document.getElementById('img-modal-img').src = canvas.toDataURL('image/png');
      document.getElementById('img-modal').classList.add('show');
    } else {
      // Android: descarga directa
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = 'boleto-w2tf-2026.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }, 'image/png');
    }
  } catch (err) {
    console.error('Error generando imagen:', err);
    // fallback: intentar print
    window.print();
  } finally {
    btn.disabled = false;
    iconEl.textContent = isMobile ? '🖼' : '⬇';
    lblEl.textContent  = isIOS ? 'Guardar imagen' : 'Descargar boleto';
  }
}

async function init() {
  if (!token) { showError('No se encontró el boleto.'); return; }
  try {
    const res  = await fetch('/api/validar?t=' + encodeURIComponent(token));
    const data = await res.json();
    if (!data.ok && !data.viewOnly) {
      if (data.reason === 'transferred') {
        showTransferred(data.transferredTo);
      } else {
        showError(
          data.reason === 'not_confirmed' ? 'Este boleto aún no ha sido confirmado.' :
          data.reason === 'not_found'     ? 'Boleto no encontrado.' :
          'No se pudo cargar el boleto.'
        );
      }
      return;
    }
    renderTicket(data);

    // Botón principal — diferente por dispositivo
    document.getElementById('btn-icon').textContent  = isMobile ? '🖼' : '⬇';
    document.getElementById('btn-label').textContent = isMobile
      ? (isIOS ? 'Guardar imagen' : 'Descargar boleto')
      : 'Guardar PDF';

    document.getElementById('btn-transfer').href = '/transferir?t=' + encodeURIComponent(token);
    document.getElementById('actions').style.display = 'flex';

    if (autoSave && !isMobile) {
      setTimeout(() => window.print(), 1000);
    }
  } catch {
    showError('Error de conexión. Intenta de nuevo.');
  }
}

function renderTicket(d) {
  const validarUrl = location.origin + '/validar?t=' + encodeURIComponent(token);
  const shortCode = token.replace(/-/g,'').substring(0,12).toUpperCase();

  wrap.innerHTML = `
<div class="ticket">
  <div class="t-logos">
    <img class="logo-belae-sm" src="/logo-belae.png" alt="BeLAE"/>
    <img class="logo-w2tf-main" src="/logo-oficial.png" alt="W2TF 2026"/>
    <span class="ticket-badge">✦ Boleto Oficial ✦</span>
  </div>
  <div class="t-num"><span>BOLETO ${d.numBoleto} DE ${d.totalBoletos}</span></div>
  <div class="t-body">
    <div class="t-holder-label">Titular del boleto</div>
    <div class="t-holder-name">${d.nombre}</div>
    <table class="t-info">
      <tr><td class="k">Tipo de acceso</td><td class="v cyan">${d.tipo||'Asistente'}</td></tr>
      <tr><td class="k">Referencia</td><td class="v purple">${d.ref}</td></tr>
      <tr><td class="k">Fecha</td><td class="v">15 de mayo, 2026</td></tr>
      <tr><td class="k">Hora</td><td class="v">2:30 PM</td></tr>
      <tr><td class="k">Lugar</td><td class="v">Tec de Monterrey CCM</td></tr>
    </table>
    <hr class="t-sep"/>
  </div>
  <div class="t-qr">
    <div class="qr-box"><canvas id="qr-canvas" style="display:block;width:150px;height:150px;"></canvas></div>
    <div class="t-qr-label">Escanea este código al ingresar al evento</div>
  </div>
  <div class="t-foot">
    <span class="t-code">${shortCode}</span>
    <span class="t-personal">Uso personal · No transferible</span>
  </div>
</div>`;

  // Generar QR client-side (sin CORS)
  if (typeof QRCode !== 'undefined') {
    QRCode.toCanvas(document.getElementById('qr-canvas'), validarUrl, {
      width: 300, margin: 2,
      color: { dark: '#000000', light: '#ffffff' }
    }).catch(err => console.error('QR error:', err));
  }
}

function showError(msg) {
  wrap.innerHTML = `<div class="state"><div style="font-size:46px;margin-bottom:14px;">❌</div><p style="color:#F87171;font-weight:700;margin-bottom:8px;font-size:16px;">Error</p><p style="font-size:13px;">${msg}</p></div>`;
}

function showTransferred(nombre) {
  wrap.innerHTML = `<div class="state">
    <div style="font-size:48px;margin-bottom:16px;">↗</div>
    <p style="color:#A78BFA;font-weight:800;margin-bottom:8px;font-size:17px;">Boleto transferido</p>
    <p style="font-size:13px;line-height:1.6;">Este boleto fue transferido a<br/><strong style="color:#fff;font-size:15px;">${nombre}</strong></p>
  </div>`;
}

init();
</script>
</body>
</html>
