<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Mi Boleto · W2TF 2026</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#050714;--purple:#7C3AED;--cyan:#22D3EE;
      --card-bg:#0a0120;--text:#CBD5E1;--muted:#64748B;
    }
    body{background:var(--bg);font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:28px 20px 48px;}

    /* Botones acción — se ocultan al imprimir */
    .actions{display:flex;gap:10px;margin-bottom:28px;width:100%;max-width:380px;}
    .btn-save{flex:1;background:linear-gradient(135deg,var(--purple),#9333EA);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;}
    .btn-transfer{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:var(--text);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;}
    .btn-save:active,.btn-transfer:active{opacity:.75;}
    .hint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:28px;max-width:340px;line-height:1.6;}

    /* ===== TICKET CARD ===== */
    .ticket{width:100%;max-width:380px;border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(122,0,255,0.35),0 8px 32px rgba(0,207,255,0.15);border:1px solid rgba(122,0,255,0.4);}

    /* Header gradient */
    .t-header{background:linear-gradient(135deg,#7A00FF 0%,#00CFFF 100%);padding:28px 24px 22px;text-align:center;}
    .t-header img.logo-w2tf{width:180px;max-width:100%;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;}
    .t-header .boleto-title{color:#fff;font-size:17px;font-weight:900;letter-spacing:0.1em;}

    /* Número de boleto */
    .t-num{background:rgba(0,207,255,0.1);border-bottom:1px solid rgba(0,207,255,0.15);padding:10px 24px;text-align:center;}
    .t-num span{color:#00CFFF;font-size:11px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;}

    /* Cuerpo */
    .t-body{background:var(--card-bg);padding:22px 22px 0;}
    .t-label{color:var(--muted);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:2px;}
    .t-name{color:#fff;font-size:26px;font-weight:900;margin-bottom:20px;line-height:1.15;}

    .t-info{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px;}
    .t-info td{padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
    .t-info td:first-child{color:var(--muted);}
    .t-info td:last-child{color:#fff;text-align:right;font-weight:600;}
    .t-info .cyan{color:#00CFFF!important;}
    .t-info .purple{color:#A78BFA!important;}
    .t-info tr:last-child td{border-bottom:none;}

    /* QR */
    .t-qr{text-align:center;padding:0 22px 20px;}
    .t-qr .qr-wrap{background:#fff;border-radius:14px;padding:10px;display:inline-block;margin-bottom:8px;}
    .t-qr img{display:block;width:160px;height:160px;}
    .t-qr .qr-hint{color:var(--muted);font-size:10px;line-height:1.5;}

    /* Línea de corte */
    .t-cut{margin:0 18px;border-top:2px dashed rgba(255,255,255,0.1);}

    /* Stub inferior */
    .t-stub{background:var(--card-bg);padding:12px 22px 22px;display:flex;align-items:center;justify-content:space-between;}
    .t-code{color:#A78BFA;font-size:11px;font-weight:700;letter-spacing:0.1em;font-family:'Courier New',monospace;}
    .t-personal{color:var(--muted);font-size:10px;}

    /* Logos footer */
    .footer-logos{margin-top:28px;display:flex;align-items:center;justify-content:center;gap:20px;opacity:.6;}
    .footer-logos img{height:32px;width:auto;}

    /* Loading / error */
    .loading,.error{text-align:center;padding:48px 0;color:var(--muted);}
    .spinner{width:40px;height:40px;border:3px solid rgba(124,58,237,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ===== PRINT / GUARDAR ===== */
    @media print {
      body{background:#050714!important;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .actions,.hint,.footer-logos{display:none!important;}
      .ticket{max-width:100%;box-shadow:none;border:1px solid rgba(122,0,255,0.3);}
      @page{margin:12mm;size:A5 portrait;}
    }
  </style>
</head>
<body>

<div class="actions" id="actions" style="display:none;">
  <button class="btn-save" onclick="guardar()">⬇ Guardar boleto</button>
  <a class="btn-transfer" id="btn-transfer" href="#">↗ Transferir</a>
</div>
<p class="hint" id="hint" style="display:none;"></p>

<div id="ticket-wrap">
  <div class="loading"><div class="spinner"></div><p>Cargando boleto…</p></div>
</div>

<div class="footer-logos" id="footer-logos" style="display:none;">
  <img src="/logo-belae.png" alt="BeLAE"/>
  <img src="/logo-oficial.png" alt="W2TF"/>
</div>

<script>
const params = new URLSearchParams(location.search);
const token  = params.get('t');
const wrap   = document.getElementById('ticket-wrap');

// Detect iOS
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const isAndroid = /Android/.test(navigator.userAgent);

async function init() {
  if (!token) { showError('No se encontró el boleto.'); return; }
  try {
    const res  = await fetch('/api/validar?t=' + encodeURIComponent(token));
    const data = await res.json();
    if (!res.ok || (!data.ok && !data.viewOnly)) {
      showError(data.reason === 'not_confirmed' ? 'Este boleto aún no ha sido confirmado.' : 'Boleto no encontrado.');
      return;
    }
    // validar sin staffpin devuelve viewOnly:true con los datos
    const d = data;
    renderTicket(d);
    // Mostrar acciones y footer
    document.getElementById('actions').style.display = 'flex';
    document.getElementById('footer-logos').style.display = 'flex';
    document.getElementById('btn-transfer').href = '/transferir?t=' + encodeURIComponent(token);
    // Hint de guardado
    const hint = document.getElementById('hint');
    hint.style.display = 'block';
    if (isIOS) {
      hint.textContent = 'iPhone: toca "Guardar boleto" → luego Compartir → Guardar en Archivos';
    } else if (isAndroid) {
      hint.textContent = 'Android: toca "Guardar boleto" → en el menú de impresión elige Guardar como PDF';
    } else {
      hint.textContent = 'Toca "Guardar boleto" y elige "Guardar como PDF" en el diálogo de impresión';
    }
  } catch {
    showError('Error de conexión. Intenta de nuevo.');
  }
}

function renderTicket(d) {
  const validarUrl = location.origin + '/validar?t=' + encodeURIComponent(token);
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=10&data=' + encodeURIComponent(validarUrl);
  const shortCode = token.replace(/-/g,'').substring(0,12).toUpperCase();

  wrap.innerHTML = `
    <div class="ticket" id="ticket">
      <div class="t-header">
        <img class="logo-w2tf" src="/logo-oficial.png" alt="Welcome 2 The Future 2026"/>
        <div class="boleto-title">✦ BOLETO OFICIAL ✦</div>
      </div>
      <div class="t-num"><span>BOLETO ${d.numBoleto} DE ${d.totalBoletos}</span></div>
      <div class="t-body">
        <div class="t-label">Titular del boleto</div>
        <div class="t-name">${d.nombre}</div>
        <table class="t-info">
          <tr><td>Tipo de acceso</td><td class="cyan">${d.tipo || 'Asistente'}</td></tr>
          <tr><td>Referencia</td><td class="purple">${d.ref}</td></tr>
          <tr><td>Fecha</td><td>15 de mayo, 2026</td></tr>
          <tr><td>Hora</td><td>2:30 PM</td></tr>
          <tr><td>Lugar</td><td>Tec de Monterrey CCM</td></tr>
        </table>
      </div>
      <div class="t-qr">
        <div class="qr-wrap"><img src="${qrUrl}" alt="QR Boleto"/></div>
        <div class="qr-hint">Presenta este código QR<br/>al ingresar al evento</div>
      </div>
      <div class="t-cut"></div>
      <div class="t-stub">
        <span class="t-code">${shortCode}</span>
        <span class="t-personal">Uso personal · No transferible</span>
      </div>
    </div>`;
}

function guardar() { window.print(); }

function showError(msg) {
  wrap.innerHTML = `<div class="error"><div style="font-size:48px;margin-bottom:16px;">❌</div><p style="color:#F87171;font-weight:700;margin-bottom:8px;">Error</p><p>${msg}</p></div>`;
}

init();
</script>
</body>
</html>
